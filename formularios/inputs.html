<html>
  <head>
    <title>Inputs no HTML</title>
  </head>
  <body>
    <h1>Inputs no HTML</h1>
    <form>
      <!--Campo de texto-->
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required />
      <br /><br />

      <!--Campo de email-->
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required />
      <br /><br />

      <!--Campo de senha-->
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" />
      <br /><br />

      <!--Campo de seleção radio-->
      <label>Gênero:</label><br />
      <input type="radio" id="masculino" name="genero" value="m" />
      <label for="masculino"></label>Masculino
      <input type="radio" id="feminino" name="genero" value="f" />
      <label for="feminino">Feminino</label>
      <br /><br />
      <!--Campo de seleção multipla checkbox-->
      <label>Interesses:</label><br />
      <input type="checkbox" id="backend" value="backend" name="Interesses" />
      <label for="backend">Backend</label>
      <input type="checkbox" id="frontend" value="frontend" name="Interesses" />
      <label for="backend">Front-end</label>
      <input type="checkbox" id="mobile" value="mobile" name="Interesses" />
      <label for="mobile">Mobile</label>
      <br /><br />

      <!--Campo de data-->
      <label for="dataDeNescimento">Data de Nascimento</label>
      <input type="date" id="dataDeNescimento" name="nascimento" />
      <br /><br />

      <!--Campo de arquivo (uploads)-->
      <label for="fotoDePerfil">Foto de Perfil</label>
      <input type="file" name="avatar" id="fotoDePerfil" />
      <br /><br />

      <!--Campo de caixa de seleção-->
      <label for="situacao">Situação Atual</label>
      <select name="situacao" id="situacao">
        <option value="" selected disabled>Selecione uma das opções...</option>
        <option value="estudando">
          Estudando para me tornar um programador.
        </option>
        <option value="estagiario">Atuando como estagiário/trainee.</option>
        <option value="junior">Atuando como desenvolvedor júnior.</option>
        <option value="pleno">Atuando como desenvolvedor pleno.</option>
        <option value="senior">Atuando como desenvolvedor sênior.</option>
      </select>
      <br><br>


      <!--Campo de area de texto de multiplas linhas-->
      <label for="sobre">Sobre Mim</label>
      <textarea name="sobre" id="sobre" cols="40" rows="6" placeholder="Fale um puoco sobre você..."></textarea>

      <br><br>
      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
